<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>회원가입</h1>
            <p>고객 또는 배송기사 계정을 생성할 수 있습니다.</p>

            <div class="nav-links">
                <a href="/login">로그인</a>
            </div>
        </div>
        <div class="card">
            <h2>고객 회원가입</h2>
            
            <div class="form-row">
                <label>Username:</label>
                <input type="text" id="customerUsername" placeholder="예: myuser01">
            </div>

            <div class="form-row">
                <label>Password:</label>
                <input type="password" id="customerPassword" placeholder="비밀번호">
            </div>

            <div class="form-row">
                <label>이름:</label>
                <input type="text" id="customerName" placeholder="예: 홍길동">
            </div>

            <div class="form-row">
                <label>전화번호:</label>
                <input type="text" id="customerPhoneNumber" placeholder="예: 010-0000-0000">
            </div>

            <button onclick="registerCustomer()">고객 회원가입</button>
        </div>
    </div>

    <script>
        function registerCustomer() {
            const username = document.getElementById("customerUsername").value;
            const password = document.getElementById("customerPassword").value;
            const name = document.getElementById("customerName").value;
            const phoneNumber = document.getElementById("customerPhoneNumber").value;

            if (!username.trim() || !password.trim() || !name.trim()) {
                alert("Username, password, 이름은 필수입니다.");
                return;
            }

            fetch("/auth/register/customer", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: username,
                    password: password,
                    name: name,
                    phoneNumber: phoneNumber
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error("회원가입 실패");
                }
                return response.text();
            })
            .then(result => {
                alert("고객 회원가입이 완료되었습니다. 로그인해주세요.");
                window.location.href="/login";
            })
            .catch(error => {
                console.error("고객 회원가입 실패:", error);
                alert("고객 회원가입에 실패했습니다. username이 이미 사용 중일 수 있습니다.");
            });
        }
    </script>
</body>
</html>
