<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Customer Order Page</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>고객 주문 페이지</h1>
            <p>로그인한 고객 계정으로 배송 요청을 생성할 수 있습니다. 배송기사는 자동 배정됩니다.</p>

            <div class="user-info">
                로그인 계정: <span id="currentUsername"></span>
                (<span id="currentRole"></span>)
                <form action="/logout" method="post" style="display: inline;">
                    <button type="submit">로그아웃</button>
                </form>
            </div>

            <div class="nav-links" id="navLinks"></div>
        </div>

        <div class="card">
            <h2>배송 요청 생성</h2>
            <div>
                <label>배송 주소:</label>
                <input type="text" id="deliveryAddress" placeholder="예: 서울시 강남구 테헤란로 123" style="width: 350px;">

                <button onclick="createDelivery()">배송 요청 생성</button>
            </div>
        </div>

        <h3>내 배송 확인</h3>
        <p>배송 생성 후 고객 ID로 배송 상태와 채팅을 확인할 수 있습니다.</p>

        <button onclick="goToCustomerDeliveryPage()">고객 배송 조회 페이지로 이동</button>

        <script>
            let currentUser = null;
            function loadCurrentUser() {
                return fetch("/auth/me")
                    .then(response => response.json())
                    .then(user => {
                        currentUser = user;

                        document.getElementById("currentUsername").textContent = user.username;
                        document.getElementById("currentRole").textContent = user.role;
                        
                        renderNavigationByRole(user);

                        return user;
                    })
                    .catch(error => {
                        console.error("현재 사용자 조회 실패:", error);
                    });
            }
            function createDelivery() {
                const customerId = currentUser.customerId;
                const deliveryAddress = document.getElementById("deliveryAddress").value;

                if (!customerId) {
                    alert("고객 계정으로 로그인해야 합니다.");
                    return;
                }

                if (!deliveryAddress.trim()) {
                    alert("배송 주소를 입력해주세요.");
                    return;
                }
                fetch("/deliveries", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        customerId: Number(customerId),
                        deliveryAddress: deliveryAddress
                    })
                })
                .then(response => response.text())
                .then(result => {
                    alert(result);
                    document.getElementById("deliveryAddress").value = "";
                })
                .catch(error => {
                    console.error("배송 요청 생성 실패:", error);
                });
            }
            function goToCustomerDeliveryPage() {
                window.location.href = "/customer-deliveries.html";
            }
            function renderNavigationByRole(user) {
                const navLinks = document.getElementById("navLinks");

                if (!navLinks) {
                    return;
                }

                navLinks.innerHTML = "";

                if (user.role === "ADMIN") {
                    navLinks.innerHTML = `
                        <a href="/admin.html">관리자 페이지</a>
                        <a href="/customer-order.html">고객 주문 페이지</a>
                        <a href="/customer-deliveries.html">고객 배송 조회</a>
                        <a href="/driver-deliveries.html">배송기사 페이지</a>
                    `;
                } else if (user.role === "CUSTOMER") {
                    navLinks.innerHTML = `
                        <a href="/customer-order.html">고객 주문 페이지</a>
                        <a href="/customer-deliveries.html">내 배송 조회</a>
                    `;
                } else if (user.role === "DRIVER") {
                    navLinks.innerHTML = `
                        <a href="/driver-deliveries.html">내 배송 관리</a>
                    `;
                }
            }
            window.onload = function () {
                loadCurrentUser();
            };
        </script>
    </div>
</body>
</html>
