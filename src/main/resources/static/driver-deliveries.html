<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Driver Deliveries</title>
</head>
<body>
    <h1>배송기사 배송 목록</h1>

    <div>
        <label>기사 ID:</label>
        <input type="number" id="driverId" value="1">
        <button onclick="loadDeliveries()">배송 목록 조회</button>
    </div>

    <hr>

    <h2>배송 목록</h2>
    <ul id="deliveryList"></ul>

    <hr>

    <h2>메시지 목록</h2>
    <ul id="messageList"></ul>

    <hr>

    <h2>배송 상태 변경</h2>
    <div>
        <select id="deliveryStatus">
            <option value="READY">READY</option>
            <option value="OUT_FOR_DELIVERY">OUT_FOR_DELIVERY</option>
            <option value="DELIVERED">DELIVERED</option>
            <option value="FAILED">FAILED</option>
        </select>

        <button onclick="updateDeliveryStatus()">상태변경</button>
    </div>

    <hr>

    <h2>메시지 보내기</h2>
    <div>
        <input type="hidden" id="selectedDeliveryId">

        <label>보낸 사람:</label>
        <select id="senderType">
            <option value="DRIVER">배송기사</option>
            <option value="CUSTOMER">고객</option>
        </select>

        <label>Sender ID:</label>
        <input type="number" id="senderId" value="1">

        <br><br>

        <input type="text" id="messageContent" placeholder="메시지를 입력하세요" style="width: 300px;">
        <button onclick="sendMessage()">메시지 보내기</button>
    </div>

    <script>
        function loadDeliveries() {
            const driverId = document.getElementById("driverId").value;

            fetch(`/drivers/${driverId}/deliveries`)
                .then(response => response.json())
                .then(deliveries => {
                    const deliveryList = document.getElementById("deliveryList");
                    deliveryList.innerHTML = "";

                    deliveries.forEach(delivery => {
                        const li = document.createElement("li");

                        li.innerHTML = `
                            배송 ID: ${delivery.id} / 
                            주소: ${delivery.deliveryAddress} /
                            상태: ${delivery.status}
                            <button onclick="loadDeliveryDetail(${delivery.id})">상세 보기</button>
                            `;
                            deliveryList.appendChild(li);
                    });
                });
        }
        function loadDeliveryDetail(deliveryId) {
            document.getElementById("selectedDeliveryId").value = deliveryId;

            fetch(`/deliveries/${deliveryId}`)
                .then(response => response.json())
                .then(delivery => {
                    const detailDiv = document.getElementById("deliveryDetail");

                    detailDiv.innerHTML = `
                        <p><strong>배송 ID:</strong> ${delivery.deliveryId}</p>
                        <p><strong>고객명:</strong> ${delivery.customerName}</p>
                        <p><strong>고객 전화번호:</strong> ${delivery.customerPhoneNumber}</p>
                        <p><strong>기사명:</strong> ${delivery.driverName}</p>
                        <p><strong>기사 전화번호:</strong> ${delivery.driverPhoneNumber}</p>
                        <p><strong>배송 주소:</strong> ${delivery.deliveryAddress}</p>
                        <p><strong>배송 상태:</strong> ${delivery.status}</p>
                    `;
                    document.getElementById("deliveryStatus").value = delivery.status;
                })
                .catch(error => {
                    console.error("배송 상세 조회 실패:", error);
                });
            loadMessages(deliveryId);
        }
        function loadMessages(deliveryId) {
            fetch(`/deliveries/${deliveryId}/messages`) 
                .then(response => response.json())
                .then(messages => {
                    const messageList = document.getElementById("messageList");
                    messageList.innerHTML = "";

                    messages.forEach(message => {
                        const li = document.createElement("li");

                        li.innerHTML = `
                            [${message.senderType}]
                            ${message.content}
                            <small>${message.createdAt}</small>
                        `;
                        messageList.appendChild(li);
                    });
                })
                .catch(error => {
                    console.error("메시지 조회 실패:", error);
                });
        }
        function sendMessage() {
            const deliveryId = document.getElementById("selectedDeliveryId").value;
            const senderType = document.getElementById("senderType").value;
            const senderId = document.getElementById("senderId").value;
            const content = document.getElementById("messageContent").value;

            if (!deliveryId) {
                alert("먼저 배송을 선택해주세요.");
                return;
            }
            if (!content.trim()) {
                alert("메세지를 입력해주세요.");
                return;
            }

            fetch(`/deliveries/${deliveryId}/messages`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    senderType: senderType,
                    senderId: Number(senderId),
                    content: content
                })
            })
            .then(response => response.text())
            .then(result => {
                console.log(result);
                document.getElementById("messageContent").value="";
                loadMessages(deliveryId);
            })
            .catch(error => {
                console.error("메세지 전송 실패:", error);
            });
        }
        function updateDeliveryStatus() {
            const deliveryId = document.getElementById("selectedDeliveryId").value;
            const status = document.getElementById("deliveryStatus").value;

            if(!deliveryId) {
                alert("먼저 배송을 선택해주세요.");
                return;
            }
            fetch(`/deliveries/${deliveryId}/status`, {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    status: status
                })
            })
            .then(response => response.text())
            .then(result => {
                console.log(result);

                alert("배송 상태가 변경되었습니다.");

                loadDeliveryDetail(deliveryId);
                loadDeliveries();
            })
            .catch(error => {
                console.error("배송 상태 변경 실패:", error);
            });
        }
    </script>
</body>
</html>
