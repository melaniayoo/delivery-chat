<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Admin Page</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>관리자 페이지</h1>
            <p>배송기사 등록 및 전체 고객, 기사, 배송 현황을 확인할 수 있습니다.</p>

            <div class="user-info">
                로그인 계정: <span id="currentUsername"></span>
                (<span id="currentRole"></span>)
                <form action="/logout" method="post" style="display: inline;">
                    <button type="submit">로그아웃</button>
                </form>
            </div>

            <div class="nav-links" id="navLinks"></div>
        </div>

        <div class="card">
            <h2>배송기사 생성</h2>
            
            <div class="form-row">
                <label>Username:</label>
                <input type="text" id="driverUsername" placeholder="예: driverkim">
            </div>

            <div class="form-row">
                <label>Password:</label>
                <input type="password" id="driverPassword" placeholder="비밀번호">
            </div>

            <div class="form-row">
                <label>기사 이름:</label>
                <input type="text" id="driverName" placeholder="예: 김기사">
            </div>

            <div class="form-row">
                <label>전화번호:</label>
                <input type="text" id="driverPhoneNumber" placeholder="예: 010-1111-1111">
            </div>

            <button onclick="createDriver()">기사 생성</button>
        </div>

        <h3>배송기사 목록</h3>
        <button onclick="loadDrivers()">기사 목록 조회</button>
        <ul id="driverList"></ul>

        <div class="card">
            <h2>고객 목록</h2>
            <button onclick="loadCustomers()">고객 목록 조회</button>
            <ul id="customerList"></ul>
        </div>

        <div class="card">
            <h2>전체 배송 목록</h2>
            <button onclick="loadDeliveries()">배송 목록 조회</button>
            <ul id="deliveryList"></ul>
        </div>

        <script>
            let currentUser = null;
            function loadCurrentUser() {
                return fetch("/auth/me")
                    .then(response => response.json())
                    .then(user => {
                        currentUser = user;

                        document.getElementById("currentUsername").textContent = user.username;
                        document.getElementById("currentRole").textContent = user.role;

                        renderNavigationByRole(user);

                        return user;
                    })
                    .catch(error => {
                        console.error("현재 사용자 조회 실패:", error);
                    });
            }
            function createDriver() {
                const username = document.getElementById("driverUsername").value;
                const password = document.getElementById("driverPassword").value;
                const name = document.getElementById("driverName").value;
                const phoneNumber = document.getElementById("driverPhoneNumber").value;

                if (!name.trim() || !password.trim() || !name.trim()) {
                    alert("Username, password, 기사 이름은 필수입니다.");
                    return;
                }

                fetch("/drivers", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        name: name,
                        phoneNumber: phoneNumber
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error("기사 생성 실패");
                    }
                    return response.text();
                })
                .then(result => {
                    alert("배송기사 계정이 생성되었습니다.");

                    document.getElementById("driverUsername").value = "";
                    document.getElementById("driverPassword").value = "";
                    document.getElementById("driverName").value = "";
                    document.getElementById("driverPhoneNumber").value = "";

                    loadDrivers();
                })
                .catch(error => {
                    console.error("기사 생성 실패:", error);
                    alert("기사 생성에 실패했습니다. username이 이미 사용 중일 수 있습니다.");
                });
            }
            function loadDrivers() {
                fetch("/drivers")
                    .then(response => response.json())
                    .then(drivers => {
                        const driverList = document.getElementById("driverList");
                        driverList.innerHTML = "";

                        drivers.forEach(driver => {
                            const li = document.createElement("li");

                            li.innerHTML = `
                                기사 ID: ${driver.id} /
                                이름: ${driver.name} /
                                전화번호: ${driver.phoneNumber}
                            `;
                            driverList.appendChild(li);
                        });
                    })
                    .catch(error => {
                        console.error("기사 목록 조회 실패:", error);
                    });
            }
            function loadCustomers() {
                fetch("/customers")
                    .then(response => response.json())
                    .then(customers => {
                        const customerList = document.getElementById("customerList");
                        customerList.innerHTML = "";

                        customers.forEach(customer => {
                            const li = document.createElement("li");

                            li.innerHTML = `
                                고객 ID: ${customer.id} /
                                이름: ${customer.name} /
                                전화번호: ${customer.phoneNumber}
                            `;
                            customerList.appendChild(li);
                        });
                    })
                    .catch(error => {
                        console.error("고객 목록 조회 실패:", error);
                    });
            }
            function loadDeliveries() {
                fetch("/deliveries")
                    .then(response => response.json())
                    .then(deliveries => {
                        const deliveryList = document.getElementById("deliveryList");
                        deliveryList.innerHTML = "";

                        deliveries.forEach(delivery => {
                            const li = document.createElement("li");
                            li.innerHTML = `
                                배송 ID: ${delivery.id} /
                                고객 ID: ${delivery.customerId} /
                                기사 ID: ${delivery.driverId} /
                                주소: ${delivery.deliveryAddress} /
                                상태: <span class="status">${delivery.status}</span>
                            `;
                            deliveryList.appendChild(li);
                        });
                    })
                    .catch(error => {
                        console.error("배송 목록 조회 실패:", error)
                    });
            }
            function renderNavigationByRole(user) {
                const navLinks = document.getElementById("navLinks");

                if (!navLinks) {
                    return;
                }

                navLinks.innerHTML = "";

                if (user.role === "ADMIN") {
                    navLinks.innerHTML = `
                        <a href="/admin.html">관리자 페이지</a>
                        <a href="/customer-order.html">고객 주문 페이지</a>
                        <a href="/customer-deliveries.html">고객 배송 조회</a>
                        <a href="/driver-deliveries.html">배송기사 페이지</a>
                    `;
                } else if (user.role === "CUSTOMER") {
                    navLinks.innerHTML = `
                        <a href="/customer-order.html">고객 주문 페이지</a>
                        <a href="/customer-deliveries.html">내 배송 조회</a>
                    `;
                } else if (user.role === "DRIVER") {
                    navLinks.innerHTML = `
                        <a href="/driver-deliveries.html">내 배송 관리</a>
                    `;
                }
            }
            window.onload = function () {
                loadDrivers();
                loadCustomers();
                loadDeliveries();
            };
        </script>
    </div>
</body>
</html>
